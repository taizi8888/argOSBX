<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT 终极流水线</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #f5f7fa; color: #333; }
        
        #main-dashboard { max-width: 1000px; margin: 30px auto; padding: 0 15px; }
        .card { background: white; padding: 20px 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 25px; }
        
        h2 { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; margin-top: 0;}
        
        button { border: none; border-radius: 5px; cursor: pointer; transition: background 0.2s; color: white; }
        button:disabled { background: #a5b4fc !important; cursor: not-allowed; }
        
        .btn-auto { background: #10b981; font-size: 15px; padding: 10px 18px; border-radius: 6px;} .btn-auto:hover { background: #059669; }
        .btn-update { background: #f59e0b; font-size: 15px; padding: 10px 18px; border-radius: 6px;} .btn-update:hover { background: #d97706; }
        .btn-batch { background: #ec4899; padding: 8px 12px;} .btn-batch:hover { background: #db2777; }
        .btn-action { background: #4f46e5; padding: 8px 12px; font-size: 14px;} .btn-action:hover { background: #4338ca; }
        .btn-view { background: #0ea5e9; padding: 8px 12px; font-size: 14px;} .btn-view:hover { background: #0284c7; }

        .toolbar { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 15px;}
        
        .item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .item:last-child { border-bottom: none; }
        .item-info { display: flex; align-items: flex-start; gap: 10px; flex: 1; min-width: 0; }
        .item-info input[type="checkbox"] { margin-top: 5px; transform: scale(1.2); cursor: pointer; }
        .item-title { flex: 1; word-wrap: break-word; word-break: break-all; line-height: 1.4; padding-right: 15px;}
        .item-actions { white-space: nowrap; flex-shrink: 0; display: flex; gap: 8px;}

        /* ================= 种子工厂 Pro 样式 ================= */
        .pro-form-group { margin-bottom: 15px; }
        .pro-form-group label { display: block; font-weight: bold; margin-bottom: 8px; color: #1e293b; font-size: 15px;}
        .pro-form-control { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; box-sizing: border-box; background: #f8fafc;}
        .pro-form-control:focus { outline: none; border-color: #3b82f6; }
        
        .pro-row { display: flex; gap: 20px; align-items: center;}
        .pro-col { flex: 1; }
        
        .checkbox-label { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #64748b; margin-top: 8px; font-weight: normal!important;}
        .btn-pro-submit { background: #1e293b; width: 100%; font-size: 16px; font-weight: bold; padding: 14px; border-radius: 6px; margin-top: 15px;}
        .btn-pro-submit:hover { background: #0f172a; }

        /* ================= 详情页样式 ================= */
        #detail-view { display: none; background: #ffffff; min-height: 100vh; padding: 40px 20px; }
        .detail-container { max-width: 1100px; margin: 0 auto; text-align: center; }
        .success-title { color: #16a34a; font-size: 32px; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px;}
        .success-title svg { width: 36px; height: 36px; fill: currentColor; }
        .btn-return { background: #1d4ed8; font-size: 18px; padding: 12px 30px; border-radius: 8px; font-weight: bold; margin-bottom: 15px; }
        .save-path { color: #64748b; font-size: 15px; margin-bottom: 25px; }
        .download-bar { display: flex; gap: 15px; justify-content: center; margin-bottom: 40px; flex-wrap: wrap;}
        .download-bar button { font-size: 16px; padding: 12px 25px; font-weight: bold; border-radius: 6px;}
        .dl-torrent { background: #15803d; } .dl-info { background: #06b6d4; } .dl-img { background: #eab308; color: #422006; }
        .preview-header { display: flex; justify-content: space-between; font-size: 18px; color: #334155; margin-bottom: 10px; text-align: left; padding: 0 10px;}
        .preview-container { display: flex; gap: 20px; align-items: stretch; text-align: left;}
        .preview-box { flex: 1; background: #fff; width: 50%; }
        .mediainfo-content { margin: 0; white-space: pre-wrap; font-family: Consolas, monospace; font-size: 13px; color: #334155; height: 500px; overflow-y: auto; background: #f8fafc; padding: 15px; border: 1px solid #e2e8f0; border-radius: 6px;}
        .preview-image { width: 100%; height: 532px; object-fit: contain; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; display: block;}
        
        @media (max-width: 768px) {
            .preview-container { flex-direction: column; }
            .preview-box { width: 100%; }
            .preview-header { display: none;}
            .pro-row { flex-direction: column; gap: 0; }
        }
    </style>
</head>
<body>

    <div id="main-dashboard">
        <div class="card" style="border-top: 4px solid #f59e0b;">
            <h2 style="color: #334155; margin-bottom: 20px; border:none; padding:0;">
                <span>🏭 种子工厂 Pro</span>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-auto" onclick="triggerTask('auto', '')">⚡ 一键全盘自动</button>
                    <button class="btn-update" onclick="hotUpdate()">🔄 更新引擎</button>
                </div>
            </h2>

            <div class="pro-form-group">
                <label>1. 目标目录 (请从下方列表中选择或直接输入)</label>
                <select id="pro-folder" class="pro-form-control">
                    <option value="">-- 请选择要处理的文件夹 --</option>
                </select>
            </div>

            <div class="pro-form-group">
                <label>2. Tracker URL</label>
                <input type="text" id="pro-tracker" class="pro-form-control" placeholder="留空则使用内置默认 Tracker">
                <label class="checkbox-label">
                    <input type="checkbox" id="pro-save-tracker"> 设为默认 (保存在浏览器)
                </label>
            </div>

            <div class="pro-row">
                <div class="pro-col">
                    <div class="pro-form-group">
                        <label>3. 截图排版</label>
                        <select id="pro-layout" class="pro-form-control">
                            <option value="auto">🤖 智能自动探测 (根据视频分辨率)</option>
                            <option value="standard">🎥 强制标准模式 (16张 2x8网格)</option>
                            <option value="vr">🥽 强制VR巨幕模式 (8张 单列竖排)</option>
                        </select>
                    </div>
                </div>
                <div class="pro-col">
                    <div class="pro-form-group">
                        <label>4. 分块大小 (Piece Size)</label>
                        <select id="pro-piece" class="pro-form-control">
                            <option value="">🤖 智能自动计算 (推荐)</option>
                            <option value="21">2 MB</option>
                            <option value="22">4 MB</option>
                            <option value="23">8 MB</option>
                            <option value="24">16 MB</option>
                        </select>
                    </div>
                </div>
            </div>

            <button class="btn-pro-submit" onclick="submitProTask()">🚀 启动定制任务</button>
        </div>

        <div class="card">
            <div class="toolbar">
                <h3 style="margin:0;">📂 下载目录状态监控</h3>
                <div>
                    <button class="btn-batch" onclick="selectAllPending()">全选待处理</button>
                    <button class="btn-batch" onclick="triggerBatch()">批量处理</button>
                </div>
            </div>
            <div id="folder-list">加载中...</div>
        </div>
    </div>

    <div id="detail-view">
        <div class="detail-container">
            <div class="success-title"><svg viewBox="0 0 24 24"><path d="M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z"/></svg> 任务完成</div>
            <button class="btn-return" onclick="closeDetailView()">🔄 制作新种子 (返回首页)</button>
            <div class="save-path">所有生成文件已覆盖保存至： <span id="detailPath" style="font-weight:bold; color:#333;"></span> 目录</div>
            <div class="download-bar">
                <button class="dl-torrent" onclick="downloadFile('torrent')">⬇️ 下载种子</button>
                <button class="dl-info" onclick="downloadFile('mediainfo')">⬇️ 下载 Info</button>
                <button class="dl-img" onclick="downloadFile('image')">⬇️ 下载缩略图</button>
            </div>
            <div class="preview-header">
                <div style="flex: 1;">MediaInfo:</div><div style="flex: 1;">缩略图预览:</div>
            </div>
            <div class="preview-container">
                <div class="preview-box"><pre class="mediainfo-content" id="detailMediaInfo">读取中...</pre></div>
                <div class="preview-box"><img class="preview-image" id="detailImage" src=""></div>
            </div>
        </div>
    </div>

    <script>
        let currentFolders = [];
        let currentActiveFolder = "";

        document.addEventListener("DOMContentLoaded", () => {
            const savedTracker = localStorage.getItem("saved_tracker");
            if(savedTracker) {
                document.getElementById("pro-tracker").value = savedTracker;
                document.getElementById("pro-save-tracker").checked = true;
            }
        });

        async function fetchFolders() {
            const res = await fetch('/api/folders');
            const data = await res.json();
            currentFolders = data.folders;
            renderList();
            updateProDropdown();
        }

        function updateProDropdown() {
            const select = document.getElementById("pro-folder");
            const currentVal = select.value;
            select.innerHTML = '<option value="">-- 请选择要处理的文件夹 --</option>';
            currentFolders.forEach(f => {
                const opt = document.createElement("option");
                opt.value = f.name;
                opt.text = `${f.name} (${f.ready ? '✅已完成' : '⏳待处理'})`;
                select.appendChild(opt);
            });
            if (currentVal) select.value = currentVal;
        }

        function renderList() {
            const list = document.getElementById('folder-list');
            list.innerHTML = '';
            currentFolders.forEach(f => {
                const color = f.ready ? 'green' : '#f59e0b';
                const actionsHtml = f.ready 
                    ? `<button class="btn-view" onclick="openDetailView('${f.name}')">👁️ 查看结果</button>
                       <button class="btn-action" onclick="fillProForm('${f.name}')" style="background:#64748b;">定制重做</button>`
                    : `<button class="btn-action" onclick="fillProForm('${f.name}')">装载至工厂</button>`;
                    
                list.innerHTML += `
                    <div class="item">
                        <div class="item-info">
                            <input type="checkbox" class="folder-check" value="${f.name}" ${f.ready ? 'disabled' : ''}>
                            <div class="item-title">
                                <strong>${f.name}</strong> <br> 
                                <span style="color:${color}; font-size: 13px;">${f.status}</span>
                            </div>
                        </div>
                        <div class="item-actions">${actionsHtml}</div>
                    </div>`;
            });
        }

        function fillProForm(folderName) {
            document.getElementById("pro-folder").value = folderName;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function submitProTask() {
            const folder = document.getElementById("pro-folder").value;
            const tracker = document.getElementById("pro-tracker").value.trim();
            const piece_size = document.getElementById("pro-piece").value;
            const layout = document.getElementById("pro-layout").value;
            const saveTracker = document.getElementById("pro-save-tracker").checked;

            if(!folder) { alert("请先选择目标目录！"); return; }
            if(saveTracker && tracker) localStorage.setItem("saved_tracker", tracker);
            else localStorage.removeItem("saved_tracker");

            let layoutName = "自动探测";
            if(layout === 'vr') layoutName = "强制 VR瀑布流";
            if(layout === 'standard') layoutName = "强制 标准模式";

            alert(`【定制任务已启动】\n目录: ${folder}\n排版: ${layoutName}\n将在后台处理，请稍后刷新。`);
            
            await fetch(`/api/run/folder`, { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ folder: folder, tracker: tracker, piece_size: piece_size, layout: layout }) 
            });
            setTimeout(fetchFolders, 3000); 
        }

        async function triggerTask(mode, folderName) {
            await fetch(`/api/run/${mode}`, { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ folder: folderName })
            });
            alert('一键全盘扫描已触发！将在后台默默执行。');
            setTimeout(fetchFolders, 3000); 
        }

        function selectAllPending() {
            document.querySelectorAll('.folder-check:not(:disabled)').forEach(cb => cb.checked = true);
        }

        async function triggerBatch() {
            const selected = Array.from(document.querySelectorAll('.folder-check:checked')).map(cb => cb.value);
            if (selected.length === 0) return alert("请先勾选需要处理的文件夹！");
            alert(`已将 ${selected.length} 个任务加入后台队列。`);
            await fetch('/api/run_batch', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ folders: selected })
            });
            setTimeout(fetchFolders, 3000);
        }

        function openDetailView(f) {
            currentActiveFolder = f;
            document.getElementById('main-dashboard').style.display = 'none';
            document.getElementById('detail-view').style.display = 'block';
            document.getElementById('detailPath').innerText = `/downloads/${f}`;
            document.getElementById('detailImage').src = `/api/files/${encodeURIComponent(f)}/image?t=${new Date().getTime()}`;
            document.getElementById('detailMediaInfo').innerText = "读取中...";
            fetch(`/api/preview/mediainfo/${encodeURIComponent(f)}`)
                .then(r => r.text()).then(t => document.getElementById('detailMediaInfo').innerText = t);
            window.scrollTo(0, 0);
        }
        
        function closeDetailView() {
            document.getElementById('detail-view').style.display = 'none';
            document.getElementById('main-dashboard').style.display = 'block';
            document.getElementById('detailImage').src = ""; 
            fetchFolders();
        }
        
        function downloadFile(type) { if(currentActiveFolder) window.open(`/api/files/${encodeURIComponent(currentActiveFolder)}/${type}`, '_blank'); }

        async function hotUpdate() {
            const btn = document.querySelector('.btn-update');
            btn.innerText = "更新中..."; btn.disabled = true;
            try { alert((await (await fetch('/api/update', { method: 'POST' })).json()).message); } catch(e) {}
            btn.innerText = "🔄 更新引擎"; btn.disabled = false;
        }

        fetchFolders();
    </script>
</body>
</html>
